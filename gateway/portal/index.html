<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Algoga · 운영 포털</title>
  <style>
    :root {
      --bg: #070b16;
      --bg-soft: #0d1424;
      --surface: rgba(20, 28, 46, 0.66);
      --surface-2: rgba(28, 38, 61, 0.9);
      --border: rgba(148, 163, 184, 0.14);
      --border-strong: rgba(148, 163, 184, 0.28);
      --text: #eef2fb;
      --muted: #8b98b0;
      --faint: #5b6880;
      --brand: #7c8bff;
      --brand-2: #38e0d8;
      --ok: #34d399; --bad: #fb7185; --wait: #fbbf24;
      --radius: 18px;
      --shadow: 0 20px 50px -20px rgba(0,0,0,.7);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6fc; --bg-soft: #eaeef8;
        --surface: rgba(255,255,255,0.82); --surface-2: #ffffff;
        --border: rgba(15,23,42,0.08); --border-strong: rgba(15,23,42,0.16);
        --text: #0b1220; --muted: #5a677f; --faint: #94a3b8;
        --shadow: 0 20px 45px -24px rgba(15,23,42,.35);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(900px 480px at 12% -8%, rgba(124,139,255,.22), transparent 60%),
        radial-gradient(760px 420px at 108% 4%, rgba(56,224,216,.16), transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg-soft));
      background-attachment: fixed;
    }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 40px 22px 56px; }

    /* 상단 바 */
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 44px; }
    .brand { display: flex; align-items: center; gap: 13px; }
    .brand .mark {
      width: 44px; height: 44px; border-radius: 13px; display: grid; place-items: center; font-size: 22px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2)); box-shadow: 0 8px 22px -8px rgba(124,139,255,.8);
    }
    .brand .name { font-weight: 800; font-size: 16px; letter-spacing: -.01em; }
    .brand .sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 999px;
      background: var(--surface); border: 1px solid var(--border); backdrop-filter: blur(10px);
      font-size: 12.5px; font-weight: 600; color: var(--muted);
    }
    .pill .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--wait); }

    /* 히어로 */
    .hero { margin-bottom: 30px; }
    .hero h1 { margin: 0; font-size: 30px; font-weight: 800; letter-spacing: -.03em; }
    .hero p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }

    /* 카드 그리드 */
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .card {
      position: relative; display: flex; flex-direction: column; text-decoration: none; color: inherit;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 22px; backdrop-filter: blur(12px); box-shadow: var(--shadow);
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
      overflow: hidden;
    }
    .card::after {
      content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
      background: linear-gradient(135deg, rgba(124,139,255,.10), transparent 42%); opacity: 0; transition: opacity .16s ease;
    }
    .card:hover { transform: translateY(-4px); border-color: var(--border-strong); background: var(--surface-2); }
    .card:hover::after { opacity: 1; }
    .card .row { display: flex; align-items: center; justify-content: space-between; }
    .card .icon {
      width: 46px; height: 46px; border-radius: 12px; display: grid; place-items: center; font-size: 24px;
      background: rgba(124,139,255,.12); border: 1px solid var(--border);
    }
    .status { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; color: var(--muted); }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--wait); box-shadow: 0 0 0 4px rgba(251,191,36,.16); }
    .status[data-state="ok"]  { color: var(--ok); }  .status[data-state="ok"]  .dot { background: var(--ok);  box-shadow: 0 0 0 4px rgba(52,211,153,.16); }
    .status[data-state="bad"] { color: var(--bad); } .status[data-state="bad"] .dot { background: var(--bad); box-shadow: 0 0 0 4px rgba(251,113,133,.16); }
    .status[data-state="wait"] .dot { animation: pulse 1.1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
    .card .title { margin-top: 16px; font-size: 18px; font-weight: 750; letter-spacing: -.01em; }
    .card .desc { margin-top: 6px; font-size: 13px; color: var(--muted); line-height: 1.55; flex: 1; }
    .card .open { margin-top: 16px; font-size: 12.5px; font-weight: 700; color: var(--brand); display: inline-flex; align-items: center; gap: 5px; }
    .card:hover .open { gap: 9px; }
    .card.ghost { border-style: dashed; opacity: .6; }
    .card.ghost .icon { background: transparent; }

    footer { margin-top: 40px; color: var(--faint); font-size: 12px; text-align: center; }
    footer code { background: var(--surface); border: 1px solid var(--border); padding: 2px 7px; border-radius: 7px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="mark">🛰️</div>
        <div>
          <div class="name">Algoga Ops</div>
          <div class="sub">운영 포털</div>
        </div>
      </div>
      <div class="pill"><span class="dot" id="sum-dot"></span><span id="sum-text">확인 중…</span></div>
    </div>

    <div class="hero">
      <h1>모니터링 대시보드</h1>
      <p>개발팀 전용 관측 허브 · 15초마다 상태 자동 갱신</p>
    </div>

    <main class="grid">
      <a class="card" href="/grafana/" data-health="/grafana/api/health">
        <div class="row">
          <div class="icon">📊</div>
          <div class="status" data-state="wait"><span class="dot"></span><span class="label">확인 중</span></div>
        </div>
        <div class="title">Grafana</div>
        <div class="desc">메트릭·로그 대시보드와 알림. 로그는 Explore에서 Loki로 조회합니다.</div>
        <span class="open">열기 →</span>
      </a>

      <a class="card" href="/prometheus/" data-health="/prometheus/-/healthy">
        <div class="row">
          <div class="icon">🔥</div>
          <div class="status" data-state="wait"><span class="dot"></span><span class="label">확인 중</span></div>
        </div>
        <div class="title">Prometheus</div>
        <div class="desc">메트릭 원본 쿼리와 스크레이프 타깃(Targets) 상태 점검.</div>
        <span class="open">열기 →</span>
      </a>

      <a class="card ghost" href="#" onclick="return false;">
        <div class="row"><div class="icon">➕</div></div>
        <div class="title">도구 추가</div>
        <div class="desc"><code>nginx.conf.tpl</code>에 location 한 줄 + 여기 카드 한 줄이면 확장됩니다.</div>
      </a>
    </main>

    <footer>Algoga 운영 포털 · nginx 게이트웨이 뒤에서 서비스는 내부 전용으로 동작합니다</footer>
  </div>

  <script>
    const cards = [...document.querySelectorAll('.card[data-health]')];
    async function check(card) {
      const status = card.querySelector('.status');
      const label = card.querySelector('.label');
      try {
        const res = await fetch(card.dataset.health, { cache: 'no-store', signal: AbortSignal.timeout(4000) });
        status.dataset.state = res.ok ? 'ok' : 'bad';
        label.textContent = res.ok ? '정상' : '오류';
      } catch (_) {
        status.dataset.state = 'bad';
        label.textContent = '접속불가';
      }
    }
    function summary() {
      const s = cards.map(c => c.querySelector('.status').dataset.state);
      const ok = s.filter(x => x === 'ok').length, total = s.length;
      document.getElementById('sum-text').textContent = `서비스 ${ok}/${total} 정상`;
      document.getElementById('sum-dot').style.background =
        ok === total ? 'var(--ok)' : (ok === 0 ? 'var(--bad)' : 'var(--wait)');
    }
    async function refresh() { await Promise.all(cards.map(check)); summary(); }
    refresh(); setInterval(refresh, 15000);
  </script>
</body>
</html>
