apiVersion: 1

datasources:
  # 대시보드 JSON들이 참조하는 UID(prometheus_ds / loki_ds)에 맞춰 고정한다.
  # 이게 안 맞으면 "datasource was not found" 로 대시보드에 데이터가 안 나온다.
  - name: Prometheus
    uid: prometheus_ds
    type: prometheus
    access: proxy
    url: http://prometheus:9090/prometheus
    isDefault: true
    editable: true

  - name: Loki
    uid: loki_ds
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true

  # CloudWatch Logs — ECS가 기본으로 남기는 로그를 Grafana에서 바로 조회/실시간 tail.
  # 인증은 모니터링 EC2의 IAM 역할 사용(authType: default). → EC2 역할에 CloudWatchReadOnlyAccess 필요.
  - name: CloudWatch
    uid: cloudwatch_ds
    type: cloudwatch
    jsonData:
      authType: default
      defaultRegion: ${AWS_REGION}   # grafana 컨테이너 env(AWS_REGION)를 Grafana가 치환
    editable: true
