apiVersion: 1

datasources:
  # Prometheus 는 route-prefix(/prometheus/)로 서빙되므로 URL에도 /prometheus 포함
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090/prometheus
    isDefault: true
    editable: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
